server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/moveme?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      database: 0
      timeout: 10000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
moveme:
  jwt:
    secret: ${JWT_SECRET:moveme-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration: 7200000    # 2小时
    refresh-token-expiration: 604800000  # 7天

  # 海报本地资源（Phase B 种子导入器复用）
  poster:
    dir: ./data/posters
    url-prefix: /static/posters

  # JSON 种子导入（Phase B）
  seed:
    auto-import: false
    json-path: classpath:/seed/top250.json
    images-dir: file:./data/images/
    poster-out-dir: file:./data/posters/

  # 推荐离线计算（Phase C）
  recommendation:
    enabled: false
    bootstrap-on-start: false
    similarity:
      top-k: 50
      min-score: 0.05
      cf-min-co-users: 5

  # LLM 配置
  llm:
    default-provider: gemini
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.0-flash
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
    claude:
      api-key: ${CLAUDE_API_KEY:}
      model: claude-sonnet-4-20250514

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**

logging:
  level:
    com.moveme: debug
    com.baomidou.mybatisplus: debug
